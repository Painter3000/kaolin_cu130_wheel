name: Build kaolin Wheel (torch 2.11.0 + CUDA 13.0 + Blackwell)

on:
  workflow_dispatch:
    inputs:
      kaolin_ref:
        description: "kaolin branch / tag / commit (default: master)"
        required: false
        default: "master"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:13.0.1-devel-ubuntu22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      FORCE_CUDA: "1"
      IGNORE_TORCH_VER: "1"
      # Nur Blackwell sm_120 – kein Multi-Arch, spart RAM und Zeit
      TORCH_CUDA_ARCH_LIST: "12.0"
      # Kaolin ist speicherintensiv – niedrig halten um OOM zu vermeiden
      MAX_JOBS: "2"

    steps:
      - name: Install system packages
        run: |
          apt-get update -y
          apt-get install -y \
            python3.10 python3.10-dev python3-pip python3-distutils \
            git build-essential ninja-build cmake \
            libgl1-mesa-glx libglib2.0-0
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1
          update-alternatives --install /usr/bin/python  python  /usr/bin/python3.10 1
          python --version
          nvcc --version

      - name: Upgrade pip and build tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install PyTorch 2.11.0 + cu130
        run: |
          python -m pip install \
            torch==2.11.0 \
            torchvision==0.26.0 \
            --index-url https://download.pytorch.org/whl/cu130
          python -c "
          import torch
          print('torch version :', torch.__version__)
          print('CUDA build    :', torch.version.cuda)
          "

      - name: Clone kaolin
        run: |
          REF="${{ github.event.inputs.kaolin_ref }}"
          REF="${REF:-master}"
          echo "Cloning kaolin @ $REF"
          git config --global credential.helper ""
          GIT_TERMINAL_PROMPT=0 git clone --recursive \
            https://github.com/NVIDIAGameWorks/kaolin.git
          cd kaolin
          git checkout "$REF"
          git log --oneline -1
          git submodule update --init --recursive

      - name: Install kaolin build dependencies
        run: |
          cd kaolin
          # Nur Build-Abhängigkeiten, kein torch doppelt installieren
          if [ -f requirements.txt ]; then
            grep -v "^torch" requirements.txt | \
            grep -v "^torchvision" | \
            pip install -r /dev/stdin || true
          fi

      - name: Build kaolin wheel
        run: |
          mkdir -p /tmp/wheels
          cd kaolin
          python -m pip wheel . \
            --no-build-isolation \
            -w /tmp/wheels/
          echo "--- Built files ---"
          ls -lh /tmp/wheels/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaolin-torch2.11.0-cu130-sm120
          path: /tmp/wheels/kaolin-*.whl
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kaolin-torch2.11.0-cu130
          name: "kaolin – torch 2.11.0 + CUDA 13.0 + Blackwell (sm_120)"
          body: |
            Custom kaolin Wheel für PSHuman / HF ZeroGPU Blackwell.

            | Komponente | Version |
            |---|---|
            | Python | 3.10 |
            | torch | 2.11.0+cu130 |
            | CUDA | 13.0 |
            | GPU-Architektur | **12.0 (Blackwell sm_120)** |
            | kaolin ref | `${{ github.event.inputs.kaolin_ref || 'master' }}` |

            > Ersetzt in requirements.txt:
            > `# disabled: kaolin`

            **Verwendung in requirements.txt:**
            ```
            https://huggingface.co/spaces/painter3000/PSHuman/resolve/main/Wheels/kaolin-XXX-cp310-cp310-linux_x86_64.whl
            ```
          files: /tmp/wheels/kaolin-*.whl
          draft: false
          prerelease: false
